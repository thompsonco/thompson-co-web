backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "lokaler"
    label: "lokaler"
    folder: "lokaler"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Eiendomsnavn", name: "title", widget: "string" }
      - { label: "Undertittel", name: "subtitle", widget: "string" }
      - label: "Bilder (Første bilde blir hovedbilde)"
        name: "galleri"
        widget: "list"
        summary: "{{fields.bilde}}"
        minimize_collapsed: true
        field: { label: "Bilde", name: "bilde", widget: "image" }
      - { label: "Om lokalene", name: "body", widget: "markdown" }

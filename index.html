<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thompson & Co</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #3d1328;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            color: #d1a3b8;
        }
        .status {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: #d1a3b8;
            opacity: 0.8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="logo">THOMPSON & CO.</div>
    <div class="status">Nettsiden er under oppbygging</div>
</body>
</html>
